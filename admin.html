<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiaCasa Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--sand:#f5efe6;--terracotta:#c17a5a;--terracotta-dark:#9e5f3f;--cream:#faf6f0;--ink:#2c2416;--ink-light:#6b5c47;--border:rgba(193,122,90,0.2);--sage:#7a9e7e;--red:#8B2020;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);}
.login-box{background:var(--cream);border-radius:8px;padding:2.5rem;width:100%;max-width:380px;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--terracotta);margin-bottom:0.25rem;}
.login-sub{font-size:0.78rem;color:var(--ink-light);margin-bottom:2rem;letter-spacing:0.04em;}
.field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.25rem;}
.field label{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);}
.field input{padding:0.75rem 1rem;border:1px solid var(--border);background:white;border-radius:4px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--terracotta);}
.btn{width:100%;padding:0.85rem;background:var(--terracotta);color:white;border:none;border-radius:4px;font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;letter-spacing:0.06em;transition:background 0.2s;}
.btn:hover{background:var(--terracotta-dark);}
.login-error{color:var(--red);font-size:0.82rem;margin-top:0.75rem;display:none;}

/* ADMIN LAYOUT */
.admin-wrap{display:none;}
.admin-nav{background:var(--ink);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;}
.admin-nav-logo{font-family:'Cormorant Garamond',serif;color:var(--sand);font-size:1.3rem;}
.admin-nav-right{display:flex;align-items:center;gap:1.5rem;}
.admin-nav-right span{color:rgba(255,255,255,0.5);font-size:0.78rem;}
.lang-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:.3rem .65rem;border-radius:3px;font-family:'Jost',sans-serif;font-size:.72rem;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--terracotta);color:white;border-color:var(--terracotta);}
.lang-btn:hover:not(.active){border-color:var(--terracotta);color:var(--terracotta);}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:0.4rem 1rem;border-radius:4px;font-family:'Jost',sans-serif;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
.admin-body{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;margin-bottom:0.25rem;}
.admin-sub{color:var(--ink-light);font-size:0.84rem;margin-bottom:2rem;}

/* TABS */
.admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:2rem;}
.admin-tab{padding:0.7rem 1.5rem;background:none;border:none;font-family:'Jost',sans-serif;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.admin-tab.active{color:var(--terracotta);border-bottom-color:var(--terracotta);}
.admin-panel{display:none;}
.admin-panel.active{display:block;}

/* ROOM STATUS GRID */
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:2rem;}
.room-card{background:white;border:1px solid var(--border);border-radius:8px;padding:1.5rem;}
.room-card.closed{border-color:rgba(139,32,32,0.3);background:#fff8f8;}
.room-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;}
.room-card-name{font-weight:500;font-size:0.95rem;margin-bottom:2px;}
.room-card-prop{font-size:0.75rem;color:var(--ink-light);}
.status-badge{font-size:0.68rem;font-weight:500;letter-spacing:0.06em;padding:0.28rem 0.7rem;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.status-badge.open{background:rgba(122,158,126,0.15);color:#065F46;}
.status-badge.closed{background:rgba(139,32,32,0.12);color:var(--red);}
.toggle-btn{width:100%;padding:0.65rem;border-radius:4px;font-family:'Jost',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;border:none;letter-spacing:0.06em;transition:all 0.2s;margin-top:0.75rem;}
.toggle-btn.close-room{background:rgba(139,32,32,0.08);color:var(--red);border:1px solid rgba(139,32,32,0.2);}
.toggle-btn.close-room:hover{background:rgba(139,32,32,0.15);}
.toggle-btn.open-room{background:rgba(122,158,126,0.1);color:#065F46;border:1px solid rgba(122,158,126,0.3);}
.toggle-btn.open-room:hover{background:rgba(122,158,126,0.2);}
.closed-msg{font-size:0.75rem;color:var(--red);margin-top:0.5rem;display:none;}

/* PRICE OVERRIDE */
.price-section{background:white;border:1px solid var(--border);border-radius:8px;padding:1.75rem;margin-bottom:1.5rem;}
.price-section-title{font-weight:500;margin-bottom:1.25rem;font-size:0.95rem;}
.price-form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;align-items:end;}
.price-field{display:flex;flex-direction:column;gap:0.4rem;}
.price-field label{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-light);}
.price-field input,.price-field select{padding:0.65rem 0.9rem;border:1px solid var(--border);background:var(--cream);border-radius:4px;font-family:'Jost',sans-serif;font-size:0.88rem;color:var(--ink);outline:none;transition:border-color 0.2s;}
.price-field input:focus,.price-field select:focus{border-color:var(--terracotta);}
.add-override-btn{padding:0.65rem 1.25rem;background:var(--terracotta);color:white;border:none;border-radius:4px;font-family:'Jost',sans-serif;font-size:0.8rem;cursor:pointer;white-space:nowrap;height:fit-content;}
.add-override-btn:hover{background:var(--terracotta-dark);}

/* OVERRIDES TABLE */
.overrides-table{width:100%;border-collapse:collapse;font-size:0.84rem;margin-top:1.25rem;}
.overrides-table th{text-align:left;padding:8px 12px;font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-light);border-bottom:1px solid var(--border);}
.overrides-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.overrides-table tr:last-child td{border-bottom:none;}
.overrides-table tr:hover td{background:var(--sand);}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:4px;transition:background 0.2s;}
.del-btn:hover{background:rgba(139,32,32,0.08);}
.no-overrides{color:var(--ink-light);font-size:0.84rem;font-style:italic;margin-top:0.75rem;}

/* STATUS BAR */
.save-bar{background:rgba(122,158,126,0.12);border:1px solid rgba(122,158,126,0.3);color:#065F46;padding:0.75rem 1.25rem;border-radius:6px;font-size:0.84rem;margin-top:1rem;display:none;}
.error-bar{background:rgba(139,32,32,0.08);border:1px solid rgba(139,32,32,0.2);color:var(--red);padding:0.75rem 1.25rem;border-radius:6px;font-size:0.84rem;margin-top:1rem;display:none;}

/* MAINTENANCE */
#maintenance-status {
  font-weight: 600;
  margin-left: 6px;
}

.status-on {
  color: var(--red);
}

.status-off {
  color: var(--sage);
}
</style>
</head>
<body>

<!-- MAINTENANCE MODE -->
<div class="price-section">
  <div class="price-section-title">
    Maintenance Mode: 
    <span id="maintenance-status" class="status-off">OFF</span>
  </div>

  <button onclick="toggleMaintenance()" id="maintenance-btn">
    Toggle Maintenance
  </button>
</div>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo" id="login-logo">MiaCasa Admin</div>
    <div class="login-sub" id="login-sub">Owner access only</div>
    <div class="field">
      <label id="lbl-username">Username</label>
      <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    </div>
    <div class="field">
      <label id="lbl-password">Password</label>
      <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" id="btn-signin" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect username or password.</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="admin-wrap">
  <nav class="admin-nav">
    <div class="admin-nav-logo">MiaCasa Admin</div>
    <div class="admin-nav-right">
      <span id="admin-greeting"></span>
      <div style="display:flex;gap:4px;margin-right:0.5rem;">
        <button id="lang-en" class="lang-btn active" onclick="setAdminLang('en')">🇬🇧 EN</button>
        <button id="lang-vn" class="lang-btn" onclick="setAdminLang('vn')">🇻🇳 VN</button>
      </div>
      <button class="logout-btn" id="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </nav>

  <div class="admin-body">
    <div class="admin-title" id="admin-page-title">Property Management</div>
    <div class="admin-sub" id="admin-page-sub">Open or close rooms · Set custom prices for specific dates</div>

    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('rooms',this)">Room Status</button>
      <button class="admin-tab" onclick="switchTab('prices',this)">Price Overrides</button>
    </div>

    <!-- ROOMS TAB -->
    <div class="admin-panel active" id="panel-rooms">
      <div class="price-section" style="margin-bottom:1.5rem;">
        <div class="price-section-title" id="rs-form-title">Set room availability for date range</div>
        <div class="price-form-grid">
          <div class="price-field">
            <label id="lbl-rs-room">Room</label>
            <select id="rs-room">
              <option value="Spring Room">Spring Room (MCH)</option>
              <option value="Summer Room">Summer Room (MCH)</option>
              <option value="Autumn Room">Autumn Room (MCH)</option>
              <option value="Entire Apartment (3 king beds)">OldQuarter Apartment</option>
            </select>
          </div>
          <div class="price-field">
            <label id="lbl-rs-from">From date <span style="font-weight:300;font-size:0.65rem;text-transform:none;">(DD/MM/YYYY)</span></label>
            <input type="date" id="rs-from">
          </div>
          <div class="price-field">
            <label id="lbl-rs-to">To date <span style="font-weight:300;font-size:0.65rem;text-transform:none;">(DD/MM/YYYY)</span></label>
            <input type="date" id="rs-to">
          </div>
          <div class="price-field">
            <label id="lbl-rs-status">Status</label>
            <select id="rs-status">
              <option value="closed">🔒 Closed (unavailable)</option>
              <option value="open">🔓 Open (available)</option>
            </select>
          </div>
          <div class="price-field">
            <label id="lbl-rs-note">Note (optional)</label>
            <input type="text" id="rs-note" placeholder="e.g. Maintenance, Personal use">
          </div>
          <div class="price-field">
            <button class="add-override-btn" id="btn-rs-apply" onclick="addRoomStatus()">Apply</button>
          </div>
        </div>
        <div class="save-bar" id="rooms-save-bar"></div>
        <div class="error-bar" id="rooms-error-bar"></div>
      </div>

      <div class="price-section">
        <div class="price-section-title" id="rs-list-title">Current room status rules</div>
        <div id="room-status-list"></div>
      </div>
    </div>

    <!-- PRICES TAB -->
    <div class="admin-panel" id="panel-prices">
      <div class="price-section">
        <div class="price-section-title" id="ov-form-title">Add price override</div>
        <div class="price-form-grid">
          <div class="price-field">
            <label id="lbl-ov-room">Room</label>
            <select id="ov-room">
              <option value="Spring Room">Spring Room (MCH)</option>
              <option value="Summer Room">Summer Room (MCH)</option>
              <option value="Autumn Room">Autumn Room (MCH)</option>
              <option value="Entire Apartment (3 king beds)">OldQuarter Apartment</option>
            </select>
          </div>
          <div class="price-field">
            <label id="lbl-ov-from">From date</label>
            <input type="date" id="ov-from">
          </div>
          <div class="price-field">
            <label id="lbl-ov-to">To date</label>
            <input type="date" id="ov-to">
          </div>
          <div class="price-field">
            <label id="lbl-ov-price">Price per night (VND)</label>
            <input type="number" id="ov-price" placeholder="e.g. 950000" step="50000">
          </div>
          <div class="price-field">
            <label id="lbl-ov-note">Note (optional)</label>
            <input type="text" id="ov-note" placeholder="e.g. Lunar New Year">
          </div>
          <div class="price-field">
            <button class="add-override-btn" id="btn-ov-add" onclick="addOverride()">Add Override</button>
          </div>
        </div>
        <div class="save-bar" id="price-save-bar"></div>
        <div class="error-bar" id="price-error-bar"></div>
      </div>

      <div class="price-section">
        <div class="price-section-title" id="ov-list-title">Active price overrides</div>
        <div id="overrides-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
// CREDENTIALS — change these before deploying
// Store as environment variables in production for better security
// ================================================================


const API_URL = '/api/log-booking'; // Netlify proxy — avoids CORS

// ================================================================
// ROOM DEFINITIONS
// ================================================================
const ROOMS = [
  { id: 'spring',     name: 'Spring Room',                    property: 'MiaCasaHanoi' },
  { id: 'summer',     name: 'Summer Room',                    property: 'MiaCasaHanoi' },
  { id: 'autumn',     name: 'Autumn Room',                    property: 'MiaCasaHanoi' },
  { id: 'oldquarter', name: 'Entire Apartment (3 king beds)', property: 'MiaCasaOldQuarter' },
];

// ================================================================
// AUTH
// ================================================================
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
      action: 'login',
      username: user,
      password: pass
})
    });

    const json = await res.json();

    if (json.status === 'ok') {
      sessionStorage.setItem('mia_admin', '1');
      sessionStorage.setItem('mia_token', json.token);
      sessionStorage.setItem('mia_user', user);
      showAdmin();
    } else {
      errEl.style.display = 'block';
    }

  } catch (e) {
    errEl.textContent = adminLang==='vn' ? 'Đăng nhập thất bại. Vui lòng thử lại.' : 'Login failed. Try again.';
    errEl.style.display = 'block';
  }
}

document.getElementById('login-user').oninput =
document.getElementById('login-pass').oninput = () => {
  document.getElementById('login-error').style.display = 'none';
};

function doLogout() {
  sessionStorage.removeItem('mia_token');
  sessionStorage.removeItem('mia_user');
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

async function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-wrap').style.display = 'block';
  document.getElementById('admin-greeting').textContent =
  'Welcome, ' + (sessionStorage.getItem('mia_user') || 'Admin');
  await renderRooms();
  await renderOverrides();
  await loadMaintenanceStatus();
}

async function getMaintenance() {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'getMaintenanceMode'
    })
  });

  const json = await res.json();
  return json.value;
}

async function toggleMaintenance() {
  const el = document.getElementById('maintenance-status');
  const current = el.textContent.toLowerCase(); // 'on' or 'off'

  const newValue = current === 'on' ? 'off' : 'on';

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'setMaintenanceMode',
      value: newValue,
      token: getToken()
    })
  });

  const json = await res.json();

  if (json.status === 'ok') {
    if (newValue === 'on') {
      el.textContent = 'ON';
      el.className = 'status-on';
    } else {
      el.textContent = 'OFF';
      el.className = 'status-off';
    }
  } else {
    alert('Failed to update maintenance mode');
  }
}



async function loadMaintenanceStatus() {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'getMaintenanceMode',
      token: getToken()
    })
  });

  const json = await res.json();

  const el = document.getElementById('maintenance-status');

  if (json.value === 'on') {
    el.textContent = 'ON';
    el.className = 'status-on';
  } else {
    el.textContent = 'OFF';
    el.className = 'status-off';
  }
}


// Check if already logged in (page refresh)
if (sessionStorage.getItem('mia_token')) showAdmin();

// ================================================================
// ROOM STATUS — date range based, stored via API
// ================================================================
async function addRoomStatus() {
  const room   = document.getElementById('rs-room').value;
  const from   = document.getElementById('rs-from').value;
  const to     = document.getElementById('rs-to').value;
  const status = document.getElementById('rs-status').value;
  const note   = document.getElementById('rs-note').value.trim();

  const errBar  = document.getElementById('rooms-error-bar');
  const saveBar = document.getElementById('rooms-save-bar');
  errBar.style.display = 'none';
  saveBar.style.display = 'none';

  if (!room || !from || !to) {
    errBar.textContent = adminLang==='vn' ? 'Vui lòng chọn phòng và cả hai ngày.' : 'Please select a room and both dates.';
    errBar.style.display = 'block';
    return;
  }
  if (new Date(to) < new Date(from)) {
    errBar.textContent = adminLang==='vn' ? 'Ngày kết thúc phải bằng hoặc sau ngày bắt đầu.' : 'End date must be on or after start date.';
    errBar.style.display = 'block';
    return;
  }

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'updateRoomStatus', room, from, to, status, note, token: getToken() })
  });
  const json = await res.json();

  if (json.status === 'ok') {
    const statusWord = adminLang==='vn' ? (status==='closed'?'đóng':'mở') : status;
    const fromWord = adminLang==='vn' ? 'từ' : 'from';
    const toWord   = adminLang==='vn' ? 'đến' : 'to';
    saveBar.textContent = '✓ ' + getRoomName(room, adminLang) + ' ' + (adminLang==='vn'?'được đặt thành ':'set to ') + statusWord + ' ' + fromWord + ' ' + fmtDateVN(from) + ' ' + toWord + ' ' + fmtDateVN(to);
    saveBar.style.display = 'block';
    setTimeout(() => saveBar.style.display = 'none', 4000);
    document.getElementById('rs-note').value = '';
    renderRoomStatusList();
  } else {
    errBar.textContent = 'Error: ' + (json.message || 'Unknown error');
    errBar.style.display = 'block';
  }
}

async function deleteRoomStatus(id) {
  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'deleteRoomStatus', id, token: getToken() })
  });
  renderRoomStatusList();
}

async function renderRoomStatusList() {
  const container = document.getElementById('room-status-list');
  container.innerHTML = '<p style="color:var(--ink-light);font-size:0.84rem;">'+(adminLang==='vn'?'Đang tải…':'Loading…')+'</p>';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'getRoomStatus', token: getToken() })
    });
    const json = await res.json();
    const rows = json.data || [];

    if (rows.length === 0) {
      container.innerHTML = `<p class="no-overrides">${ADMIN_LANG[adminLang]['no-rules']}</p>`;
      return;
    }

    // Sort by from date descending
    rows.sort((a,b) => new Date(b[2]) - new Date(a[2]));

    const AL = ADMIN_LANG[adminLang];
    container.innerHTML = `
      <table class="overrides-table">
        <thead><tr>
          <th>${AL['th-room']}</th><th>${AL['th-from']}</th><th>${AL['th-to']}</th>
          <th>${AL['th-status']}</th><th>${AL['th-note']}</th><th></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td>${getRoomName(r[0], adminLang)}</td>
            <td>${fmtDateVN(r[1])}</td>
            <td>${fmtDateVN(r[2])}</td>
            <td><span style="font-weight:500;color:${r[3]==='closed'?'#991B1B':'#065F46'}">${getStatusLabel(r[3], adminLang)}</span></td>
            <td style="color:var(--ink-light);">${r[4]||'—'}</td>
            <td><button class="del-btn" onclick="deleteRoomStatus('${r[5]}')">✕</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    container.innerHTML = '<p style="color:#991B1B;font-size:0.84rem;">'+(adminLang==='vn'?'Không tải được dữ liệu phòng.':'Failed to load room status.')+'</p>';
  }
}

async function renderRooms() {
  await renderRoomStatusList();
}

// ================================================================
// PRICE OVERRIDES — stored in localStorage
// ================================================================
async function fetchOverrides() {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getPriceOverrides', token: getToken() })
  });
  return (await res.json()).data || [];
}

async function saveOverride(data) {
  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
    action: 'addPriceOverride',
    ...data,
    token: getToken()
    })
  });
}

async function addOverride() {
  const btn = document.querySelector('.add-override-btn');
  btn.disabled = true;
  const room  = document.getElementById('ov-room').value;
  const from  = document.getElementById('ov-from').value;
  const to    = document.getElementById('ov-to').value;
  const price = parseInt(document.getElementById('ov-price').value);
  const note  = document.getElementById('ov-note').value.trim();
  document.getElementById('ov-room').selectedIndex = 0;
  const errBar  = document.getElementById('price-error-bar');
  const saveBar = document.getElementById('price-save-bar');
  errBar.style.display = 'none';
  saveBar.style.display = 'none';

  if (!room || !from || !to || !price) {
    errBar.textContent = adminLang==='vn' ? 'Vui lòng điền đầy đủ thông tin (phòng, ngày, giá).' : 'Please fill in all required fields (room, dates, price).';
    errBar.style.display = 'block';
    return;
  }
  if (new Date(to) <= new Date(from)) {
    errBar.textContent = adminLang==='vn' ? 'Ngày kết thúc phải sau ngày bắt đầu.' : 'End date must be after start date.';
    errBar.style.display = 'block';
    return;
  }
  if (price < 100000) {
    errBar.textContent = adminLang==='vn' ? 'Giá có vẻ quá thấp — vui lòng nhập bằng VND (VD: 750000).' : 'Price seems too low — please enter in VND (e.g. 750000).';
    errBar.style.display = 'block';
    return;
  }

  await saveOverride({ room, from, to, price, note });

  // Clear form
  document.getElementById('ov-from').value = '';
  document.getElementById('ov-to').value = '';
  document.getElementById('ov-price').value = '';
  document.getElementById('ov-note').value = '';

  saveBar.textContent = '✓ ' + (adminLang==='vn'?'Đã thêm: ':'Override added: ') + getRoomName(room,adminLang) + ' · ' + fmtDateVN(from) + ' → ' + fmtDateVN(to) + ' · ' + price.toLocaleString('vi-VN') + '₫';
  saveBar.style.display = 'block';
  setTimeout(() => saveBar.style.display = 'none', 4000);

  renderOverrides();  
  btn.disabled = false;
}

async function deleteOverride(id) {
  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
    action: 'deletePriceOverride',
    id: id,
    token: getToken()
    })
  });

  renderOverrides();
}

async function renderOverrides() {
  const container = document.getElementById('overrides-list');
  const overrides = await fetchOverrides();

  if (overrides.length === 0) {
    container.innerHTML = `<p class="no-overrides">${ADMIN_LANG[adminLang]['no-overrides']}</p>`;
    return;
  }

  // Sort by date
  overrides.sort((a,b) => new Date(a.from) - new Date(b.from));

  const AL2 = ADMIN_LANG[adminLang];
  container.innerHTML = `
    <table class="overrides-table">
      <thead>
        <tr>
          <th>${AL2['th-room']}</th>
          <th>${AL2['th-from']}</th>
          <th>${AL2['th-to']}</th>
          <th>${AL2['th-price']}</th>
          <th>${AL2['th-usd']}</th>
          <th>${AL2['th-note']}</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${overrides.map(o => `
          <tr>
            <td>${getRoomName(o.room, adminLang)}</td>
            <td>${o.from}</td>
            <td>${o.to}</td>
            <td style="font-weight:500;color:var(--terracotta);">${Number(o.price).toLocaleString('vi-VN')}₫</td>
            <td style="color:var(--ink-light);">~$${(o.price/25000).toFixed(0)}</td>
            <td style="color:var(--ink-light);">${o.note || '—'}</td>
            <td><button class="del-btn" onclick="deleteOverride(${o.id})">${adminLang==='vn'?'✕ Xoá':'✕ Remove'}</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

  'Spring Room': 'Spring Room',
  'Summer Room': 'Summer Room',
  'Autumn Room': 'Autumn Room',
  'Entire Apartment (3 king beds)': 'Entire Apartment (3 king beds)',

const ROOM_NAMES_VN = {

  'Entire Apartment (3 king beds)': 'Toàn bộ căn hộ (3 giường đôi)',
};
function getRoomName(enName, lang) {
  if (lang === 'vn' && ROOM_NAMES_VN[enName]) return ROOM_NAMES_VN[enName];
  return enName;
}
function getStatusLabel(status, lang) {
  if (lang === 'vn') return status === 'closed' ? '🔒 Đóng' : '🔓 Mở';
  return status === 'closed' ? '🔒 Closed' : '🔓 Open';
}
function getAdminMsg(key) {
  return (ADMIN_LANG[adminLang] && ADMIN_LANG[adminLang][key]) || key;
}

// ================================================================
// DATE FORMAT UTILITY (DD/MM/YYYY)
// ================================================================
function fmtDateVN(dateStr) {
  if (!dateStr) return '—';
  const s = String(dateStr).split('T')[0]; // handle ISO strings
  const parts = s.split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
  return dateStr;
}

// ================================================================

function switchTab(name, btn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'rooms') renderRoomStatusList();
  if (name === 'prices') renderOverrides();
}

let adminLang = localStorage.getItem('mia_lang') || 'en';

function setAdminLang(lang) {
  adminLang = lang;
  localStorage.setItem('mia_lang', lang);

  const enBtn = document.getElementById('lang-en');
  const vnBtn = document.getElementById('lang-vn');
  if (enBtn) enBtn.classList.toggle('active', lang==='en');
  if (vnBtn) vnBtn.classList.toggle('active', lang==='vn');

  const L = ADMIN_LANG[lang];
  if (!L) return;

  const txt = (id, key) => { const el=document.getElementById(id); if(el&&L[key]!==undefined) el.textContent=L[key]; };
  const ph  = (id, key) => { const el=document.getElementById(id); if(el&&L[key]!==undefined) el.placeholder=L[key]; };

  // Login screen
  txt('login-logo','login-logo'); txt('login-sub','login-sub');
  txt('lbl-username','lbl-username'); txt('lbl-password','lbl-password');
  txt('btn-signin','btn-signin'); txt('login-error','login-error');

  // Admin panel
  txt('admin-page-title','page-title'); txt('admin-page-sub','page-sub');
  txt('logout-btn','logout');

  // Tab buttons
  const tabs = document.querySelectorAll('.admin-tab');
  if(tabs[0]) tabs[0].textContent = L['tab-rooms'];
  if(tabs[1]) tabs[1].textContent = L['tab-prices'];

  // Room status form
  txt('rs-form-title','rs-form-title');
  txt('lbl-rs-room','lbl-rs-room'); txt('lbl-rs-from','lbl-rs-from'); txt('lbl-rs-to','lbl-rs-to');
  txt('lbl-rs-status','lbl-rs-status'); txt('lbl-rs-note','lbl-rs-note');
  ph('rs-note','ph-rs-note');
  txt('btn-rs-apply','btn-rs-apply');
  txt('rs-list-title','rs-list-title');

  // Room status select options
  const rsSel = document.getElementById('rs-status');
  if(rsSel && rsSel.options.length >= 2) {
    rsSel.options[0].text = L['opt-rs-closed'];
    rsSel.options[1].text = L['opt-rs-open'];
  }

  // Room select options (both rs-room and ov-room)
  const roomOpts = { 0:L['room-spring'], 1:L['room-summer'], 2:L['room-autumn'], 3:L['room-oq'] };
  ['rs-room','ov-room'].forEach(selId => {
    const sel = document.getElementById(selId);
    if(sel) Object.entries(roomOpts).forEach(([i,t]) => { if(sel.options[i]) sel.options[i].text = t; });
  });

  // Price override form
  txt('ov-form-title','ov-form-title');
  txt('lbl-ov-room','lbl-ov-room'); txt('lbl-ov-from','lbl-ov-from'); txt('lbl-ov-to','lbl-ov-to');
  txt('lbl-ov-price','lbl-ov-price'); txt('lbl-ov-note','lbl-ov-note');
  ph('ov-price','ph-ov-price'); ph('ov-note','ph-ov-note');
  txt('btn-ov-add','btn-ov-add');
  txt('ov-list-title','ov-list-title');

  // Re-render dynamic lists with translated headers
  renderRoomStatusList();
  renderOverrides();
}
